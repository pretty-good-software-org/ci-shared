name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: node --test actions/post-plan-comment/post-plan-comment.test.js

  lint:
    name: Lint
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Actionlint
        run: actionlint
