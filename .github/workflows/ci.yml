name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  MISE_ENV: ci

jobs:
  test:
    name: Test
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install npm dependencies
        run: npm ci
      - name: Run tests
        run: task test

  lint:
    name: Lint
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install npm dependencies
        run: npm ci
      - name: Run linters
        run: task lint

  build:
    name: Build
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install npm dependencies
        run: npm ci
      - name: Compile TypeScript
        run: task build
      - name: Verify compiled JS is up-to-date
        run: git diff --exit-code actions/*/*/dist/
