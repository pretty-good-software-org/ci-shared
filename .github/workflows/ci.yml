name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  MISE_ENV: ci

# One live run per ref — a new push supersedes the queued/running one
# instead of piling up when runners are saturated or offline.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 5
    steps:
      - name: Setup
        uses: pretty-good-software-org/ci-shared/actions/setup/mise@v1
        with:
          mise-env: ci
      - name: Install npm dependencies
        run: mise exec -- npm ci
      - name: Run tests
        run: mise run test

  lint:
    name: Lint
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 5
    steps:
      - name: Setup
        uses: pretty-good-software-org/ci-shared/actions/setup/mise@v1
        with:
          mise-env: ci
      - name: Install npm dependencies
        run: mise exec -- npm ci
      - name: Run linters
        run: mise run lint

  build:
    name: Build
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 5
    steps:
      - name: Setup
        uses: pretty-good-software-org/ci-shared/actions/setup/mise@v1
        with:
          mise-env: ci
      - name: Install npm dependencies
        run: mise exec -- npm ci
      - name: Compile TypeScript
        run: mise run build
      - name: Verify compiled JS is up-to-date
        run: git diff --exit-code actions/*/*/dist/
