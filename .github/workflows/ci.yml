name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  MISE_ENV: ci

jobs:
  test:
    name: Test
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: mise install
      - name: Run tests
        run: mise exec -- task test

  lint:
    name: Lint
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: mise install
      - name: Run linters
        run: mise exec -- task lint
