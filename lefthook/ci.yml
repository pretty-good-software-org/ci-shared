pre-commit:
  commands:
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: actionlint -color -oneline
      fail_text: "actionlint found issues"
    yamllint:
      glob: "*.{yaml,yml}"
      run: yamllint --strict .
      fail_text: "yamllint found issues"
    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 "**/*.md"
      fail_text: "markdownlint found issues"
    oxlint:
      glob: "*.ts"
      run: oxlint actions/
      fail_text: "oxlint found issues"
    oxfmt:
      glob: "*.ts"
      run: oxfmt --check 'actions/**/*.ts'
      fail_text: "oxfmt found formatting issues"
    typecheck:
      glob: "*.ts"
      run: npx tsc --noEmit
      fail_text: "TypeScript type errors found"
