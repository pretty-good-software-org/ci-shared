pre-commit:
  commands:
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: mise run lint:actions
      fail_text: "actionlint found issues"
    yamllint:
      glob: "*.{yaml,yml}"
      run: mise run lint:yaml
      fail_text: "yamllint found issues"
    markdown-format:
      glob: "**/*.md"
      run: >-
        bash -c 'source mise-tasks/setup/mdformat-env && mise run setup:mdformat &&
        "$MISE_MDFORMAT_ENV_DIR/bin/mdformat" --check "$@"' -- {staged_files}
      fail_text: "mdformat found formatting issues"
    markdownlint:
      glob: "**/*.md"
      run: mise run lint:markdown
      fail_text: "markdownlint found issues"
    oxlint:
      glob: "*.ts"
      run: mise run lint:ts
      fail_text: "oxlint found issues"
    oxfmt:
      glob: "*.ts"
      run: mise run lint:format:check
      fail_text: "oxfmt found formatting issues"
    typecheck:
      glob: "*.ts"
      run: mise run lint:typecheck
      fail_text: "TypeScript type errors found"
