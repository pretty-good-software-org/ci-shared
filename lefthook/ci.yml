pre-commit:
  commands:
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: task lint:actions
      fail_text: "actionlint found issues"
    yamllint:
      glob: "*.{yaml,yml}"
      run: task lint:yaml
      fail_text: "yamllint found issues"
    markdownlint:
      glob: "*.md"
      run: task lint:markdown
      fail_text: "markdownlint found issues"
    oxlint:
      glob: "*.ts"
      run: task lint:ts
      fail_text: "oxlint found issues"
    oxfmt:
      glob: "*.ts"
      run: task lint:format:check
      fail_text: "oxfmt found formatting issues"
    typecheck:
      glob: "*.ts"
      run: task lint:typecheck
      fail_text: "TypeScript type errors found"
