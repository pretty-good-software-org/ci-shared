---
pre-commit:
  parallel: true
  commands:
    markdown-format:
      glob: "**/*.md"
      run: >-
        bash -c 'source mise-tasks/setup/mdformat-env &&
        mise run setup:mdformat &&
        "$MISE_MDFORMAT_ENV_DIR/bin/mdformat" --check "$@"' -- {staged_files}
      fail_text: "mdformat found formatting issues"
