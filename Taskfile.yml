version: '3'

includes:
  setup:
    taskfile: ./taskfiles/setup.yml
  build:
    taskfile: ./taskfiles/build.yml
  lint:
    taskfile: ./taskfiles/lint.yml
  test:
    taskfile: ./taskfiles/test.yml
  release:
    taskfile: ./taskfiles/release.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  ci:validate:
    desc: Run all CI checks
    cmds:
      - task: build
      - task: lint
      - task: test
