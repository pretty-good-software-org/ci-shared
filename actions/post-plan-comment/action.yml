name: 'Post Plan Comment'
description: 'Post OpenTofu plan results as a PR comment (create or update)'
inputs:
  plan:
    description: 'OpenTofu plan output text'
    required: true
  fmt_outcome:
    description: 'Outcome of the format check step'
    required: true
  init_outcome:
    description: 'Outcome of the init step'
    required: true
  validate_outcome:
    description: 'Outcome of the validate step'
    required: true
  plan_outcome:
    description: 'Outcome of the plan step'
    required: true
  has_violations:
    description: 'Whether conftest policy violations were found (true/false)'
    required: true
  actor:
    description: 'GitHub actor who triggered the workflow'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/github-script@v7
      env:
        PLAN: ${{ inputs.plan }}
        FMT_OUTCOME: ${{ inputs.fmt_outcome }}
        INIT_OUTCOME: ${{ inputs.init_outcome }}
        VALIDATE_OUTCOME: ${{ inputs.validate_outcome }}
        PLAN_OUTCOME: ${{ inputs.plan_outcome }}
        HAS_VIOLATIONS: ${{ inputs.has_violations }}
        ACTOR: ${{ inputs.actor }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/post-plan-comment.js')
          await script({github, context})
