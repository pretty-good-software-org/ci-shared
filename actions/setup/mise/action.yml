name: 'Setup Mise'
description: 'Checkout repository and install tools via mise'
inputs:
  mise-env:
    description: 'MISE_ENV value (e.g., "ci")'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for authenticated API requests during tool install (avoids rate limits)'
    required: false
    default: ${{ github.token }}
  fetch-depth:
    description: 'Checkout fetch depth; set 0 for full history (needed by commit-range checks like cog check)'
    required: false
    default: '1'
runs:
  using: 'composite'
  steps:
    # Compatibility pin (2026-07-19): this is a documented-baseline deviation from
    # checkout v7 because runner 2.335.1 maps logical GITHUB_WORKSPACE
    # /home/admin/.github-runner to physical gitdir /home/admin/actions-runner.
    # v7's credential includeIf follows only the logical path, so fetch fails with
    # "could not read Username"; v5 writes repository-local http.extraheader and
    # succeeds. Prefer that upstream behavior over bespoke credential handling.
    # Exit path: return to v7 when logical and physical workspace paths are
    # identical or upstream supports symlinked gitdirs.
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
    - uses: jdx/mise-action@v4
      env:
        MISE_ENV: ${{ inputs.mise-env || env.MISE_ENV }}
      with:
        # Exact pin: 2026.7.7 handles URL-less npm/pipx lock entries. The
        # installer resolves Python separately because multi-tool resolution
        # rejects its valid lock entry on the self-hosted Linux ARM64 runner.
        version: 2026.7.7
        # mise-action force-adds --locked whenever a mise.lock exists but does NOT
        # enable the lockfile setting, so its own install fails with "locked mode
        # requires lockfile to be enabled". Skip it and run the install below with
        # the lockfile setting ON (MISE_LOCKFILE=1) — locked mode then verifies the
        # committed checksums/attestations. Fleet locks are URL-complete (aqua
        # entries carry url+checksum; npm/pipx carry neither and are tolerated).
        install: false
        github_token: ${{ inputs.github-token }}
    # Resolve the runner workspace once before mise discovers config and locks.
    # Legacy runners can expose GITHUB_WORKSPACE through ~/.github-runner while
    # the checkout lives under ~/actions-runner; install.sh pins both lookups to
    # the physical repository until RUNNER_ROOT is deployed fleet-wide.
    - run: '"${{ github.action_path }}/install.sh"'
      shell: bash
      env:
        MISE_ENV: ${{ inputs.mise-env || env.MISE_ENV }}
        MISE_LOCKFILE: '1'
