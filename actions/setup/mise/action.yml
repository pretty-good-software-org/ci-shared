name: 'Setup Mise'
description: 'Checkout repository and install tools via mise'
inputs:
  mise-env:
    description: 'MISE_ENV value (e.g., "ci")'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v2
      env:
        MISE_ENV: ${{ inputs.mise-env }}
      with:
        install_args: '--verbose'
