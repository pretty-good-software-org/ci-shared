name: 'Setup Mise'
description: 'Checkout repository and install tools via mise'
inputs:
  mise-env:
    description: 'MISE_ENV value (e.g., "ci")'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for authenticated API requests during tool install (avoids rate limits)'
    required: false
    default: ${{ github.token }}
  fetch-depth:
    description: 'Checkout fetch depth; set 0 for full history (needed by commit-range checks like cog check)'
    required: false
    default: '1'
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
    - uses: jdx/mise-action@v4
      env:
        MISE_ENV: ${{ inputs.mise-env || env.MISE_ENV }}
      with:
        # PIN — mise 2026.7.2 (2026-07-07) panics instead of erroring on url-less
        # lockfile entries (npm/pipx backends have no single-asset URL). Keep the
        # pin until that panic is fixed upstream; 2026.7.1 handles them cleanly.
        version: 2026.7.1
        # mise-action force-adds --locked whenever a mise.lock exists but does NOT
        # enable the lockfile setting, so its own install fails with "locked mode
        # requires lockfile to be enabled". Skip it and run the install below with
        # the lockfile setting ON (MISE_LOCKFILE=1) — locked mode then verifies the
        # committed checksums/attestations. Fleet locks are URL-complete (aqua
        # entries carry url+checksum; npm/pipx carry neither and are tolerated).
        install: false
        github_token: ${{ inputs.github-token }}
    - run: mise install --locked --verbose
      shell: bash
      env:
        MISE_ENV: ${{ inputs.mise-env || env.MISE_ENV }}
        MISE_LOCKFILE: '1'
