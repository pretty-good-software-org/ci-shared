name: 'Setup Mise'
description: 'Checkout repository and install tools via mise'
inputs:
  mise-env:
    description: 'MISE_ENV value (e.g., "ci")'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for authenticated API requests during tool install (avoids rate limits)'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
    - uses: jdx/mise-action@v4
      env:
        MISE_ENV: ${{ inputs.mise-env }}
      with:
        install_args: '--verbose'
        github_token: ${{ inputs.github-token }}
