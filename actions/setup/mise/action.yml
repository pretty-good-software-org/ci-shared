name: 'Setup Mise'
description: 'Checkout repository and install tools via mise'
inputs:
  mise-env:
    description: 'MISE_ENV value (e.g., "ci")'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for authenticated API requests during tool install (avoids rate limits)'
    required: false
    default: ${{ github.token }}
  fetch-depth:
    description: 'Checkout fetch depth; set 0 for full history (needed by commit-range checks like cog check)'
    required: false
    default: '1'
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
    - uses: jdx/mise-action@v4
      env:
        MISE_ENV: ${{ inputs.mise-env || env.MISE_ENV }}
      with:
        # TEMPORARY PIN — mise 2026.7.2 (2026-07-07) panics instead of erroring
        # on locked-mode lockfile entries without URLs. Remove with the step below.
        version: 2026.7.1
        # TEMPORARY — mise-action force-adds --locked whenever mise.lock exists,
        # and most org lockfiles carry checksum-only entries that locked mode
        # rejects ("No lockfile URL found"). Skip the action's install and run a
        # plain (unlocked) install below; remove both once fleet lockfiles are
        # regenerated URL-complete.
        install: false
        github_token: ${{ inputs.github-token }}
    - run: mise install --verbose
      shell: bash
      env:
        MISE_ENV: ${{ inputs.mise-env || env.MISE_ENV }}
        MISE_LOCKFILE: '0'
