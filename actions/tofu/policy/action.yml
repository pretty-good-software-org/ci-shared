name: 'OpenTofu Policy Check'
description: 'Run Conftest policy checks against an OpenTofu plan'
inputs:
  plan-json:
    description: 'Path to the JSON plan file'
    required: false
    default: 'tofu/plan.json'
  client-id:
    description: 'GitHub App client ID for cross-repo access (to clone opa-policies)'
    required: false
    default: ''
  app-id:
    description: 'Deprecated: GitHub App ID for cross-repo access. Use client-id instead.'
    required: false
    default: ''
  private-key:
    description: 'GitHub App private key for cross-repo access'
    required: false
    default: ''
outputs:
  has_violations:
    description: 'Whether policy violations were found (true/false)'
    value: ${{ steps.policy.outputs.has_violations }}
  policy_violations:
    description: 'Violation details (empty if none)'
    value: ${{ steps.policy.outputs.policy_violations }}
runs:
  using: 'composite'
  steps:
    - name: Generate cross-repo token for policy fetching
      if: inputs.client-id != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}
        owner: pretty-good-software-org

    - name: Generate cross-repo token for legacy policy fetching
      if: inputs.client-id == '' && inputs.app-id != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token-legacy
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: pretty-good-software-org

    - name: Configure git for cross-repo policy fetching
      shell: bash
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token || steps.app-token-legacy.outputs.token || '' }}
      run: |
        # Conftest uses go-getter to clone the opa-policies repo.
        # go-getter runs git from a temp directory outside the checkout,
        # so all git config must be --global (not --local).
        #
        # GITHUB_TOKEN only has access to the current repo. The opa-policies
        # repo requires a cross-repo token from the CI_PRIVATE_CONTENT app.
        git config --global --add url."https://github.com/".insteadOf \
          "ssh://git@github.com/"
        git config --global --add url."https://github.com/".insteadOf \
          "git@github.com:"

        # Use GitHub App token (cross-repo) if available, fall back to
        # the checkout extraheader (GITHUB_TOKEN, same-repo only).
        if [ -n "$APP_TOKEN" ]; then
          HEADER=$(printf 'x-access-token:%s' "$APP_TOKEN" | base64)
          git config --global --add http.https://github.com/.extraheader \
            "AUTHORIZATION: basic ${HEADER}"
        else
          EXTRAHEADER=$(git config --local --get http.https://github.com/.extraheader 2>/dev/null || true)
          if [ -n "$EXTRAHEADER" ]; then
            git config --global --add http.https://github.com/.extraheader "$EXTRAHEADER"
          fi
        fi

    - uses: actions/github-script@v7
      id: policy
      env:
        INPUT_PLAN_JSON: ${{ inputs.plan-json }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/dist/index.js')
          await script({core})
