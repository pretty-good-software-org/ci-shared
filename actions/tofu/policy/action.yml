name: 'OpenTofu Policy Check'
description: 'Run Conftest policy checks against an OpenTofu plan'
inputs:
  plan-json:
    description: 'Path to the JSON plan file'
    required: false
    default: 'tofu/plan.json'
outputs:
  has_violations:
    description: 'Whether policy violations were found (true/false)'
    value: ${{ steps.policy.outputs.has_violations }}
  policy_violations:
    description: 'Violation details (empty if none)'
    value: ${{ steps.policy.outputs.policy_violations }}
runs:
  using: 'composite'
  steps:
    - name: Configure git HTTPS rewrite for policy fetching
      shell: bash
      run: |
        # Conftest uses go-getter to clone the opa-policies repo.
        # go-getter runs git from a temp directory outside the checkout,
        # so all git config must be --global (not --local).
        #
        # 1. Rewrite SSH→HTTPS URLs
        # 2. Copy the HTTPS auth header that actions/checkout configured
        #    (GITHUB_TOKEN as basic auth for github.com)
        git config --global --add url."https://github.com/".insteadOf \
          "ssh://git@github.com/"
        git config --global --add url."https://github.com/".insteadOf \
          "git@github.com:"

        # Propagate the HTTPS auth header from local (set by actions/checkout)
        # to global so go-getter can authenticate to private repos.
        EXTRAHEADER=$(git config --local --get http.https://github.com/.extraheader 2>/dev/null || true)
        if [ -n "$EXTRAHEADER" ]; then
          git config --global --add http.https://github.com/.extraheader "$EXTRAHEADER"
        fi

    - uses: actions/github-script@v7
      id: policy
      env:
        INPUT_PLAN_JSON: ${{ inputs.plan-json }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/dist/index.js')
          await script({core})
