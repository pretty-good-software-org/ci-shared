name: 'Build Step Summary'
description: 'Build OpenTofu step outcomes as a markdown fragment'
inputs:
  fmt_outcome:
    description: 'Outcome of the format check step'
    required: true
  init_outcome:
    description: 'Outcome of the init step'
    required: true
  validate_outcome:
    description: 'Outcome of the validate step'
    required: true
  plan_outcome:
    description: 'Outcome of the plan step'
    required: true
outputs:
  step-summary:
    description: 'Markdown heading and step outcome lines'
    value: ${{ steps.build.outputs.step-summary }}
runs:
  using: 'composite'
  steps:
    - uses: actions/github-script@v7
      id: build
      env:
        INPUT_FMT_OUTCOME: ${{ inputs.fmt_outcome }}
        INPUT_INIT_OUTCOME: ${{ inputs.init_outcome }}
        INPUT_VALIDATE_OUTCOME: ${{ inputs.validate_outcome }}
        INPUT_PLAN_OUTCOME: ${{ inputs.plan_outcome }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/dist/index.js')
          await script({core})
