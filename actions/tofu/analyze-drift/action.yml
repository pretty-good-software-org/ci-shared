name: "Analyze Drift"
description: "Parse OpenTofu plan JSON to detect infrastructure drift and build a markdown summary"
inputs:
  plan-json:
    description: "OpenTofu plan JSON string (output of tofu show -json planfile)"
    required: true
outputs:
  has-drift:
    description: "Whether drift was detected (true/false)"
    value: ${{ steps.analyze.outputs.has-drift }}
  drift-summary:
    description: "Markdown fragment summarizing drift status"
    value: ${{ steps.analyze.outputs.drift-summary }}
runs:
  using: "composite"
  steps:
    - uses: actions/github-script@v7
      id: analyze
      env:
        INPUT_PLAN_JSON: ${{ inputs.plan-json }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/dist/index.js')
          await script({core})
