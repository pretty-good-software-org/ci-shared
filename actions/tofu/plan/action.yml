name: 'OpenTofu Plan'
description: 'Create OpenTofu plan and capture outputs'
inputs:
  working-directory:
    description: 'Directory containing OpenTofu configuration'
    required: false
    default: 'tofu'
  var-file:
    description: 'Path to a tfvars file (relative to working directory)'
    required: false
    default: ''
outputs:
  plan:
    description: 'Plan text (truncated to 60k chars)'
    value: ${{ steps.plan.outputs.plan }}
  plan-file:
    description: 'Path to binary plan file'
    value: ${{ steps.plan.outputs.plan-file }}
  plan-json:
    description: 'Path to JSON plan file'
    value: ${{ steps.plan.outputs.plan-json }}
runs:
  using: 'composite'
  steps:
    - uses: actions/github-script@v7
      id: plan
      env:
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_VAR_FILE: ${{ inputs.var-file }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/dist/index.js')
          await script({core})
