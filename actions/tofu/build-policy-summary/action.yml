name: 'Build Policy Summary'
description: 'Build OpenTofu policy check result as a markdown fragment'
inputs:
  has_violations:
    description: 'Whether conftest policy violations were found (true/false)'
    required: true
  actor:
    description: 'GitHub actor who triggered the workflow'
    required: true
outputs:
  policy-summary:
    description: 'Policy status line and actor footer'
    value: ${{ steps.build.outputs.policy-summary }}
runs:
  using: 'composite'
  steps:
    - uses: actions/github-script@v7
      id: build
      env:
        INPUT_HAS_VIOLATIONS: ${{ inputs.has_violations }}
        INPUT_ACTOR: ${{ inputs.actor }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/dist/index.js')
          await script({core})
