name: 'Build Plan Details'
description: 'Build OpenTofu plan output as a collapsible markdown fragment'
inputs:
  plan:
    description: 'OpenTofu plan output text'
    required: true
outputs:
  plan-details:
    description: 'Collapsible details block with terraform code fence'
    value: ${{ steps.build.outputs.plan-details }}
runs:
  using: 'composite'
  steps:
    - uses: actions/github-script@v7
      id: build
      env:
        INPUT_PLAN: ${{ inputs.plan }}
      with:
        github-token: ${{ github.token }}
        script: |
          const script = require('${{ github.action_path }}/dist/index.js')
          await script({core})
