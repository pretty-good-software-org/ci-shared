version: '3'

tasks:
  default:
    desc: Run all linters
    cmds:
      - task: actions
      - task: yaml
      - task: markdown
      - task: ts
      - task: typecheck
      - task: format:check

  actions:
    desc: Lint GitHub Actions workflows
    cmds:
      - actionlint

  yaml:
    desc: Lint YAML files
    cmds:
      - yamllint --strict .

  markdown:
    desc: Lint Markdown files
    cmds:
      - markdownlint-cli2 "**/*.md"

  ts:
    desc: Lint TypeScript files
    cmds:
      - oxlint actions/ lib/

  typecheck:
    desc: Type-check TypeScript files
    cmds:
      - npx tsc --noEmit

  format:
    desc: Auto-format TypeScript files
    cmds:
      - oxfmt --write 'actions/**/*.ts' 'lib/**/*.ts'

  format:check:
    desc: Check TypeScript formatting
    cmds:
      - oxfmt --check 'actions/**/*.ts' 'lib/**/*.ts'
