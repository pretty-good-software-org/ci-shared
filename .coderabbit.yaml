# CodeRabbit configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

tone_instructions: "Be laconic. Skip praise. Focus only on issues that must be fixed."

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: false
  collapse_walkthrough: true
  poem: false
  auto_review:
    drafts: false
    enabled: true
    auto_incremental_review: true
    base_branches:
      - main
  path_filters:
    - "!**/node_modules/**"
  tools:
    github-checks:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"

early_access: true
